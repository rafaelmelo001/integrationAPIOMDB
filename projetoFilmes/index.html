<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movie Search</title>

    <link rel="stylesheet" href="./CSS/styleFilms.css">

    <script 
        type="module" 
        src="./JS/controller/filmController.js" 
        defer>
    </script>

</head>

        </section>

    </main>
